name: Release Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/

jobs:
  release-windows-x64:
    name: Build and publish Windows x64
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync app version with tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Verify WeFlow runtime identity
        shell: bash
        run: |
          node -e "const p=require('./package.json');const expected={name:'weflow',appId:'com.WeFlow.app',productName:'WeFlow'};const actual={name:p.name,appId:p.build?.appId,productName:p.build?.productName};for(const key of Object.keys(expected)){if(actual[key]!==expected[key]){throw new Error(key+' must remain '+expected[key]+' for the protected Windows runtime (received '+actual[key]+')')}}"
          test -f resources/wcdb/win32/x64/wcdb_api.dll
          test -f resources/wcdb/win32/x64/WCDB.dll
          test -f resources/wcdb/win32/x64/SDL2.dll

      - name: Type check
        run: npm run typecheck

      - name: Build application
        run: npx vite build

      - name: Build installer and publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          npx electron-builder
          --win nsis
          --x64
          --publish always
          '--config.publish.owner=${{ github.repository_owner }}'
          '--config.publish.repo=${{ github.event.repository.name }}'
          '--config.artifactName=${productName}-${version}-x64-Setup.${ext}'

      - name: Show published files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY"
